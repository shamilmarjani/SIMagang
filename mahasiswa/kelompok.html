<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelompok Magang - SIMM</title>
    <!-- Use Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
    <div class="dashboard-layout">
        
        <!-- Sidebar -->
        <aside class="sidebar">
            <a href="../../index.html" class="logo-container">
                <div class="logo-icons">
                    <div class="logo-icon y"></div>
                    <div class="logo-icon b"></div>
                    <div class="logo-icon c"></div>
                </div>
                <div class="logo-text-inner">
                    <span class="logo-text-jti">JTI</span>
                    <span class="logo-text-desc">JURUSAN<br>TEKNOLOGI<br>INFORMASI</span>
                </div>
            </a>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">Dashbord</a>
                <a href="kelompok.html" class="nav-item active">Kelompok</a>
                <a href="pendaftaran.html" class="nav-item">Pendaftaran</a>
                <a href="profil.html" class="nav-item">Profil</a>
            </nav>
            
            <div class="sidebar-footer">
                <a href="../../auth/login.html" class="nav-item logout-btn">Logout</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            
            <!-- Kelompok Card -->
            <div class="card kelompok-card">
                <div class="card-header dark">
                    <h3>Kelompok Magang Saya</h3>
                </div>

                <div class="card-body" style="padding-top: 20px;">

                    <!-- Ketua Kelompok -->
                    <h4 class="member-section-title">Ketua Kelompok</h4>
                    <div class="member-card">
                        <div class="member-avatar"></div>
                        <div class="member-info">
                            <div class="member-name-row">
                                <h4>Sultan</h4>
                                <span class="badge-role">Ketua</span>
                            </div>
                            <p class="member-nim">NIM: 123456789</p>
                        </div>
                        <div class="member-status">
                            <span class="badge-status">Berkas Lengkap</span>
                        </div>
                    </div>

                    <!-- Anggota -->
                    <h4 class="member-section-title" style="margin-top: 24px;">Anggota</h4>
                    <div id="member-list-container">
                        <!-- Daftar anggota akan ditambahkan di sini -->
                    </div>

                    <!-- Form Tambah Anggota -->
                    <div class="add-member-form" style="margin-top: 30px; background: #fff; padding: 20px; border-radius: 10px; border: 1px solid #EAEAEA;">
                        <h5 style="margin-bottom: 15px; font-size: 15px; font-weight: 600; color: #222;">Tambah Anggota Baru</h5>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Nama Mahasiswa</label>
                                <input type="text" id="new-member-name" placeholder="Masukkan Nama">
                            </div>
                            <div class="form-group">
                                <label>NIM</label>
                                <input type="text" id="new-member-nim" placeholder="Masukkan NIM">
                            </div>
                        </div>
                        <div class="form-actions" style="margin-top: 20px;">
                            <button type="button" class="btn btn-dark" id="btn-tambah-anggota">Tambah Anggota</button>
                        </div>
                    </div>

                </div>
            </div>

        </main>
    </div>

    <script>
        // Fitur Tambah Anggota
        document.getElementById('btn-tambah-anggota').addEventListener('click', () => {
            const nameInput = document.getElementById('new-member-name');
            const nimInput  = document.getElementById('new-member-nim');
            const name = nameInput.value.trim();
            const nim  = nimInput.value.trim();

            if (name && nim) {
                const memberList = document.getElementById('member-list-container');
                
                const card = document.createElement('div');
                card.className = 'member-card';
                card.innerHTML = `
                    <div class="member-avatar"></div>
                    <div class="member-info">
                        <div class="member-name-row">
                            <h4>${name}</h4>
                            <span class="badge-role" style="background:#E8F4FF;color:#1C334D;">Anggota</span>
                        </div>
                        <p class="member-nim">NIM: ${nim}</p>
                    </div>
                    <div class="member-status">
                        <span class="badge-status" style="background:#FFF0DC;color:#FF9F43;">Berkas Belum</span>
                    </div>
                `;
                
                memberList.appendChild(card);
                
                // Reset input
                nameInput.value = '';
                nimInput.value  = '';
            } else {
                alert('Mohon isi Nama dan NIM terlebih dahulu!');
            }
        });
    </script>
    <script src="../js/mahasiswa.js"></script>
</body>
</html>
