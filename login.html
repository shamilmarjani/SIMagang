<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Informasi Magang Mahasiswa - Login</title>
    <!-- Use Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="background-container"></div>

    <header class="navbar">
        <a href="index.html" class="logo-container">
            <div class="logo-icons">
                <div class="logo-icon y"></div>
                <div class="logo-icon b"></div>
                <div class="logo-icon c"></div>
            </div>
            <div class="logo-text">
                <span class="logo-text-inner">
                    <span class="logo-text-jti">JTI</span>
                    <span class="logo-text-desc">JURUSAN<br>TEKNOLOGI<br>INFORMASI</span>
                </span>
            </div>
        </a>
        <div class="nav-links">
            <a href="login.html" id="link-login">login</a>
            <a href="register.html" id="link-daftar" class="btn-daftar">daftar</a>
        </div>
    </header>

    <div id="app">
        <!-- LOGIN VIEW -->
        <section class="split-layout">
            <div class="split-half">
                <div class="form-container" style="margin-left: auto; margin-right: 15%;">
                    <h2>Login</h2>
                    <form id="login-form" onsubmit="handleLogin(event)">
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="login-email" placeholder="sultansalahuddin@students.college.ac.id" required>
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="login-password" placeholder="••••••••" required>
                        </div>
                        <div class="form-group">
                            <label>Role</label>
                            <select id="login-role" required class="form-control">
                                <option value="">-- Pilih Role --</option>
                                <option value="mahasiswa">Mahasiswa</option>
                                <option value="korbid">Koordinator Bidang</option>
                            </select>
                        </div>
                        <p id="login-error" style="color:#EA5455;font-size:13px;margin-bottom:8px;display:none;">Email, password, atau role tidak valid.</p>
                        <button type="submit" class="btn-submit">Login</button>
                    </form>
                </div>
            </div>
            <div class="split-half flex-start">
                <div class="text-block" style="padding-left: 10%;">
                    <h2>SIMM</h2>
                    <p>UYEKDBEJKDLINIMLJDE98KDJCOWJDONJISW7SYNISyeukdbysjiwoduniskidojmuwhnhsjhhd</p>
                </div>
            </div>
        </section>
    </div>

<script>
    function handleLogin(e) {
        e.preventDefault();

        const email    = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        const role     = document.getElementById('login-role').value;
        const errEl    = document.getElementById('login-error');

        // Validasi: pastikan email dan password diisi, dan role dipilih
        if (!email || !password || !role) {
            errEl.textContent = 'Harap lengkapi semua field.';
            errEl.style.display = 'block';
            return;
        }

        errEl.style.display = 'none';

        // Redirect sesuai role yang dipilih
        if (role === 'korbid') {
            window.location.href = 'koordinator.html';
        } else {
            window.location.href = 'dashboard.html';
        }
    }
</script>

</body>

</html>
